    <style>
        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            width: min(580px, 90vw);
            margin: 0 auto;
        }
        .ctglogo{
            width: min(250px, 60vw);
        }
        .square {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
        }
        .square img {
            width: 100%;
            height: 100%;
            display: block;
            user-drag: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
        }
        .piece {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            user-drag: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
        }
        .recimg {
            height: 50px;
        }
</style>
</head>
<body style="background-color: rgb(235, 233, 230);">

    <div id="app" class="appLoading">
        <!-- 头部 -->

                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"

                                </li> -->
                                <li class="nav-item dropdown me-2">

        <section class="d-flex justify-content-center">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="container">
                        <div class="row align-items-start">

                            <!-- Left content -->
                            <div class="col-xl-3 col-lg-2 col-12 order-xl-1 order-1">
                            <div class="p-3">
                                <img class="ctglogo" src="sprites/ctg.png">
                                <p id="dateText"></p>
                                <textarea id="winText" rows="3" style="resize: none; width: 100%; display: none;" disabled></textarea>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/isaac.js"></script>
    <script>
        language = 0;
        const guessesTexts = ["Guesses: ", "猜測次數：", "猜测次数：", "推測回数："];
    </script>
    <script src="js/board.js"></script>
    <script>
      let homeTexts = []
      let wishListTexts = ["Get it now on Steam!", "快到Steam上遊玩！", "快到Steam上游玩！", "Steamでプレイしよう！"]
      let carouselTexts = []
      let carouselIndex = 0
      let charactersList = ["Characters", "角色", "角色", "キャラクター"]
      let characterIndex = 0
      let characterNameList = []
      let characterDescriptionList = []
      let navbarTexts = []
      let characterImageSrcs = []
      let link = {}
      //let language = 0
      //let dateTexts = [`${EN_month[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`, `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`, `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`, `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`];

      fetch('./data/data.json')
      .then(response => response.json())  // 解析 JSON 数据
      .then(async data => {
          homeTexts = data.homeTexts
          carouselTexts = data.carouselTexts
          characterNameList = data.characterNameList
          characterDescriptionList = data.characterDescriptionList
          for(let i = 0; i < characterDescriptionList.length; i++) for(let j = 0; j < characterDescriptionList[i].length; j++) {
              characterDescriptionList[i][j] = characterDescriptionList[i][j].replace("{", "<img src=\"pictures/icon/");
              characterDescriptionList[i][j] = characterDescriptionList[i][j].replace("}", "\" style=\"width: 125px; vertical-align: text-top;\">");
          }
          navbarTexts = data.navbarTexts
          characterImageSrcs = data.characterNameList[0].map((element, index) => {
              return `./pictures/character/${index}.webp`
          })
          links = data.links

          characterImageSrcs.push('pictures/icon/1x2move.webp')
          characterImageSrcs.push('pictures/icon/1x3move.webp')
          characterImageSrcs.push('pictures/icon/2x2move.webp')
          // vue.typeWriterEffect(vue.homeTexts[vue.language].description)

          await preloadImages(characterImageSrcs)
          document.getElementById('loading').style.display = 'none'
          document.getElementById('app').classList.remove('appLoading')

          document.getElementById('steamLink').href = links.steam
          document.getElementById('discordLink').href = links.discord
          document.getElementById('youtubeLink').href = links.youtube
          document.getElementById('twitterLink').href = links.twitter
      })
      .catch(error => console.error('Error loading JSON:', error));

      const languageButton = document.querySelector('.dropdown-menu')
      languageButton.addEventListener('click', languageToggle)

      // 导航
      const topLink = document.querySelector('.top')
      const introLink = document.querySelector('.intro')
      const langLink = document.querySelector('.lang')

      // 主页
      const homeTitle = document.querySelector('.homeTitle')
      const homeText = document.querySelector('.homeText')
      const wishList = document.querySelector('.wishList')
      const dateText = document.getElementById("dateText")
      dateText.innerHTML = dateTexts[language];
      updateGuesses();
      const winText = document.getElementById("winText");

      // 轮播图
      const carouselTitle = document.querySelector('.carouselTitle')
      const carouselDescription = document.querySelector('.carouselDescription')

      const carousel = document.querySelector('#carouselExampleIndicators')
      const carouselText = document.querySelector('#carouselText')
      carousel.addEventListener('slid.bs.carousel', (e) => {
        carouselText.classList.add('fade-animation');
        carouselIndex = e.to;
        carouselToggle(language)
        // 设置动画结束后移除动画类，方便重新触发动画
        carouselText.addEventListener('animationend', () => {
            carouselText.classList.remove('fade-animation');
        });
      })

      // 角色
      const characters = document.querySelector('.characters')
      const characterName = document.querySelector('.characterName')
      const characterDescription = document.querySelector('.characterDescription')
      const characterImage = document.querySelector('.characterImage')
          
      // 角色切换
      const leftButton = document.getElementById('left-button')
      const rightButton = document.getElementById('right-button')

      console.log(leftButton)

      leftButton.addEventListener('click', click.bind(null, false))
      rightButton.addEventListener('click', click.bind(null, true))

      // 语言切换
      function languageToggle (e) {
        let newLang = e.target.dataset.lid
        if (language !== newLang) {
          language = newLang
          // 导航栏
          topLink.innerHTML = `<i class="iconfont icon-cc-arrow-circle-up" style="vertical-align: middle;"></i> ${navbarTexts[newLang].home}`
          //introLink.innerHTML = `<i class="iconfont icon-intro" style="vertical-align: middle;"></i> ${navbarTexts[newLang].introduction}`
          langLink.innerHTML = `<i class="iconfont icon-language" style="vertical-align: middle"></i> ${navbarTexts[newLang].language}`

          // 主页
          //homeTitle.innerHTML = `${homeTexts[newLang].title}`
          //homeText.innerHTML = `${homeTexts[newLang].description}`
          dateText.innerHTML = dateTexts[newLang];
          updateGuesses();
          winText.innerHTML = winTexts[newLang];

          // 愿望清单
          //wishList.innerHTML = wishListTexts[newLang]

          // 轮播图
          //carouselToggle(newLang)

          // 角色
          //characters.innerHTML = charactersList[newLang]
          //characterName.innerHTML =  characterNameList[newLang][characterIndex]
          //characterDescription.innerHTML = characterDescriptionList[newLang][characterIndex]
        }
      }

      function carouselToggle(newLang) {
        carouselTitle.innerHTML = carouselTexts[newLang][carouselIndex].title
        carouselDescription.innerHTML = carouselTexts[newLang][carouselIndex].description
      }

      // 角色切换
      function characterToggle() {
        characterName.innerHTML =  characterNameList[language][characterIndex]
        characterDescription.innerHTML = characterDescriptionList[language][characterIndex]
        characterImage.src = characterImageSrcs[characterIndex]
      }

      async function preloadImages(imageUrls) {
        const promises = imageUrls.map(url => {
            return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = resolve;  // 加载成功时 resolve
            img.onerror = reject;  // 加载失败时 reject
            img.src = url;
            });
        });

        await Promise.all(promises); // 等待所有图片加载完成
        }

      function click(next) {
        if (next) {
            if (characterIndex + 1 < characterNameList[0].length) characterIndex++
            else characterIndex = 0
        }
        else {
            if (characterIndex > 0) characterIndex--
            else characterIndex = characterNameList[0].length - 1
        }
        characterToggle()
          // this.characterImageSrc = `./pictures/character/${this.characterNameList[vue.language][vue.characterIndex]}.png`
      }

         //                 typeWriterEffect(targetText) {
    //                     let speed = +this.language === 0 ? 6 : 30
    //                     let index = 0
    //                     this.homeText = ''
    //                     clearInterval(this.timer)
    //                     this.timer = setInterval(type, speed);
    //                     function type() {
    //                         if (index < targetText.length) vue.homeText += targetText[index++]
    //                         else clearInterval(this.timer)
    //                     }
    //                 }
    </script>
