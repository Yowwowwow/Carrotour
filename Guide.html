    <style>
        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            width: min(580px, 90vw);
            margin: 0 auto;
        }
        .ctglogo{
            width: min(250px, 60vw);
        }
        .square {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
        }
        .square img {
            width: 100%;
            height: 100%;
            display: block;
            user-drag: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
        }
        .piece {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            user-drag: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
        }
        .recimg {
            height: 50px;
        }
        .click-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60%;
            z-index: 10;
            opacity: 1;
            pointer-events: none;
            transform: translate(-50%, -50%) rotate(var(--rot)) scale(0.5);
            animation: clickEffectAnim 0.5s ease-out forwards;
        }
        @keyframes clickEffectAnim {
            from {
                transform: translate(-50%, -50%) rotate(var(--rot)) scale(0.5);
                opacity: 1;
            }
            to {
                transform: translate(-50%, -50%) rotate(var(--rot)) scale(1.8);
                opacity: 0;
            }
        }
</style>

    <script>
        language = 0;
        const numberOfLanguages = 4
        const guessesTexts = ["Guesses: ", "猜測次數：", "猜测次数：", "推測回数："];
    </script>

    <script>
      let homeTexts = []
      let wishListTexts = ["Get it now on Steam!", "快到Steam上遊玩！", "快到Steam上游玩！", "Steamでプレイしよう！"]
      let carouselTexts = []
      let carouselIndex = 0
      let charactersList = ["Characters", "角色", "角色", "キャラクター"]
      let characterIndex = 0
      let characterNameList = []
      let characterDescriptionList = []
      let navbarTexts = []
      let characterImageSrcs = []
      let link = {}
      let copyTexts = ["Copy", "複製", "复制", "コピー"];
      let CTLogo = '<img src="pictures/icon/Logo.png" style="height: 1.5em;">';
      let getCTTexts = [`Get ${CTLogo} on Steam!`, `在Steam獲取${CTLogo}吧！`, `在Steam获取${CTLogo}吧！`, `Steamで${CTLogo}をゲット！`];
      //let language = 0
      //let dateTexts = [`${EN_month[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`, `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`, `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`, `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`];

      fetch('./data/data.json')
      .then(response => response.json())  // 解析 JSON 数据
      .then(async data => {
          navbarTexts = data.navbarTexts
          links = data.links
          await preloadImages(characterImageSrcs)
          document.getElementById('loading').style.display = 'none'
          document.getElementById('app').classList.remove('appLoading')

          //document.getElementById('steamLink').href = links.steam
          document.getElementById('discordLink').href = links.discord
          document.getElementById('youtubeLink').href = links.youtube
          document.getElementById('twitterLink').href = links.twitter
          document.getElementById('navSteamLink').href = links.steam
          document.getElementById('ctgLink').href = links.carrotourguide
          ApplySavedLanguage();
      })
      .catch(error => console.error('Error loading JSON:', error));

      const languageButton = document.querySelector('.dropdown-menu')
      languageButton.addEventListener('click', languageToggle)

      // 导航
      const topLink = document.querySelector('.top')
      const langLink = document.querySelector('.lang')

      // 主页
      const homeTitle = document.querySelector('.homeTitle')
      const homeText = document.querySelector('.homeText')
      const wishList = document.querySelector('.wishList')
      const dateText = document.getElementById("dateText")
      dateText.innerHTML = dateTexts[language];
      updateGuesses();
      const winText = document.getElementById("winText");
      const getCT = document.getElementById("getCT");
      const copyButton = document.getElementById("copyButton");
      let copyTimeout = null;
      function CopyResult(){
        winText.disabled = false;
        winText.select();
        winText.setSelectionRange(0, 9999);
        document.execCommand("copy");
        winText.disabled = true;
        clearTimeout(copyTimeout);
        copyButton.innerHTML = "✅";
        copyTimeout = setTimeout(()=>{copyButton.innerHTML=copyTexts[language];}, 1000);
      }
      // 语言切换
      function languageToggle (e, forceNewLang=null) {
        let newLang = forceNewLang ?? e.target.dataset.lid;
        if (language !== newLang) {
          language = newLang;
          localStorage.setItem("lang", newLang);
          // 导航栏
          topLink.innerHTML = `<i class="iconfont icon-cc-arrow-circle-up" style="vertical-align: middle;"></i> ${navbarTexts[newLang].home}`
          langLink.innerHTML = `<i class="iconfont icon-language" style="vertical-align: middle"></i> ${navbarTexts[newLang].language}`
          dateText.innerHTML = dateTexts[newLang];
          updateGuesses();
          winText.innerHTML = winTexts[newLang];
          copyButton.innerHTML = copyTexts[newLang];
          helpTitle.innerHTML = helpTitles[newLang];
          helpContent.innerHTML = helpContents[newLang];
          getCT.innerHTML = getCTTexts[newLang];

          UpdateStats();
        }
      }
      function ApplySavedLanguage(){
        let savedLanguage = parseInt(localStorage.getItem("lang"));
        if(savedLanguage!=NaN && savedLanguage>=0 && savedLanguage<numberOfLanguages)languageToggle(null, savedLanguage);
      }
      function carouselToggle(newLang) {
        carouselTitle.innerHTML = carouselTexts[newLang][carouselIndex].title
        carouselDescription.innerHTML = carouselTexts[newLang][carouselIndex].description
      }

      // 角色切换
      function characterToggle() {
        characterName.innerHTML =  characterNameList[language][characterIndex]
        characterDescription.innerHTML = characterDescriptionList[language][characterIndex]
        characterImage.src = characterImageSrcs[characterIndex]
      }

      async function preloadImages(imageUrls) {
        const promises = imageUrls.map(url => {
            return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = resolve;  // 加载成功时 resolve
            img.onerror = reject;  // 加载失败时 reject
            img.src = url;
            });
        });

        await Promise.all(promises); // 等待所有图片加载完成
        }

      function click(next) {
        if (next) {
            if (characterIndex + 1 < characterNameList[0].length) characterIndex++
            else characterIndex = 0
        }
        else {
            if (characterIndex > 0) characterIndex--
            else characterIndex = characterNameList[0].length - 1
        }
        characterToggle()
          // this.characterImageSrc = `./pictures/character/${this.characterNameList[vue.language][vue.characterIndex]}.png`
      }

    //                     let speed = +this.language === 0 ? 6 : 30

    //                     clearInterval(this.timer)

    //                     function type() {
    //                         if (index < targetText.length) vue.homeText += targetText[index++]
    //                         else clearInterval(this.timer)
    //                     }
    //                 }
